# From
# https://github.com/shortcuts/neovim-plugin-boilerplate/blob/main/.github/workflows/main.yml

name: tests

on:
  push:
  pull_request:
    types: [opened, synchronize]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: lint
    steps:
      - uses: actions/checkout@v4

      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check . -g '*.lua' -g '!deps/'

  test:
    timeout-minutes: 4
    strategy:
      matrix:
        # restore_error_handler_spec.lua seems to sometimes cause a segfault or LuaJIT assertion failure on ubuntu 24.04
        os: [ubuntu-22.04]
        # neovim_version: ["v0.7.2", "v0.9.5", "v0.10.3", "v0.11.3", "nightly"]
        neovim_version: ["v0.9.5"]
        # include:
        #   - os: windows-latest
        #     neovim_version: v0.11.3
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: setup neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim_version }}

      - name: Add nvim to PATH
        run: echo "${{ steps.setup_nvim.outputs.executable }}" >> $GITHUB_PATH

      # For sshing in to debug GH actions
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          detached: true

      - name: Run tests
        run: make test
